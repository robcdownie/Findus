<style>
:root{
  --glacier:oklch(0.72 0.108 199); --glacier-deep:oklch(0.55 0.098 205); --glacier-ink:oklch(0.44 0.075 207);
  --glacier-soft:oklch(0.945 0.030 200); --pine:oklch(0.45 0.055 165); --pine-soft:oklch(0.935 0.028 165);
  --gold-soft:oklch(0.948 0.032 80); --gold-ink:oklch(0.52 0.078 72);
  --stone:oklch(0.31 0.018 235); --stone-2:oklch(0.475 0.018 233); --stone-3:oklch(0.63 0.014 230);
  --snow:oklch(0.995 0.003 210); --sky:oklch(0.974 0.009 205); --line:oklch(0.905 0.011 208); --line-2:oklch(0.86 0.014 208);
  --shadow-sm:0 1px 2px oklch(0.4 0.03 230 / .05), 0 4px 14px -8px oklch(0.4 0.05 230 / .16);
  --ff-disp:'Bricolage Grotesque',ui-sans-serif,system-ui,sans-serif;
  --ff-body:'Hanken Grotesk',ui-sans-serif,-apple-system,system-ui,sans-serif;
  --ff-tag:'Overpass',ui-sans-serif,system-ui,sans-serif; --e-out:cubic-bezier(.2,.75,.2,1);
}
*{box-sizing:border-box;} html,body{margin:0;padding:0;}
body{font-family:var(--ff-body);background:var(--sky);color:var(--stone);line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:540px;margin-inline:auto;min-height:100dvh;background:var(--sky);box-shadow:0 0 60px -30px oklch(0.4 0.05 230 / .25);padding-bottom:40px;}
a{color:var(--glacier-deep);text-decoration:none;}
.hero{position:relative;height:min(56dvh,460px);min-height:320px;overflow:hidden;background:#0e2a30;}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 42%;animation:z 16s ease-out both;}
@keyframes z{from{transform:scale(1.08);}to{transform:scale(1);}}
.hero .scrim{position:absolute;inset:0;background:linear-gradient(to top,oklch(0.16 0.03 220 / .84) 0%,oklch(0.16 0.03 220 / .35) 34%,oklch(0.16 0.03 220 / 0) 60%,oklch(0.16 0.03 220 / .25) 100%);}
.hero .body{position:absolute;left:0;right:0;bottom:0;padding:0 22px 24px;}
.hero .ey{font-family:var(--ff-tag);font-size:.66rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:oklch(0.98 0 0 / .82);margin:0 0 6px;}
.hero h1{font-family:var(--ff-disp);font-weight:800;color:#fff;font-size:clamp(2.4rem,10vw,3.4rem);line-height:.95;letter-spacing:-.02em;margin:0;text-shadow:0 2px 26px oklch(0.15 0.03 220 / .5);}
.hero .sub{margin:9px 0 0;color:oklch(0.98 0 0 / .9);font-size:.98rem;font-weight:500;}
.share{position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:18px;display:inline-flex;align-items:center;gap:7px;
  font-family:var(--ff-tag);font-weight:700;font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;color:#fff;
  background:oklch(0.99 0.01 210 / .18);border:1px solid oklch(0.99 0 0 / .3);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:8px 12px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.share svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pad{padding:22px 18px 6px;}
.eyebrow{font-family:var(--ff-tag);font-size:.66rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--glacier-ink);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--line-2);}
.now{margin:0 18px;background:var(--snow);border:1px solid var(--glacier);border-radius:20px;box-shadow:0 0 0 1px var(--glacier),var(--shadow-sm);padding:18px;}
.now .k{font-family:var(--ff-tag);font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--glacier-ink);margin:0 0 3px;display:flex;align-items:center;gap:7px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--glacier);display:inline-block;animation:p 2s var(--e-out) infinite;}
@keyframes p{0%,100%{box-shadow:0 0 0 0 oklch(0.72 0.108 199 / .5);}50%{box-shadow:0 0 0 7px oklch(0.72 0.108 199 / 0);}}
.now h2{font-family:var(--ff-disp);font-weight:800;font-size:1.5rem;letter-spacing:-.02em;margin:0 0 6px;}
.now p{margin:0;color:var(--stone-2);font-size:.96rem;}
.now .dinner{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:11px;}
.now .dinner .di{width:34px;height:34px;border-radius:10px;background:var(--gold-soft);color:var(--gold-ink);display:grid;place-items:center;flex:0 0 auto;}
.now .dinner .di svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.now .dinner b{display:block;font-weight:700;font-size:.98rem;color:var(--stone);}
.now .dinner span{font-size:.82rem;color:var(--stone-2);}
.now .dinner a{margin-left:auto;font-family:var(--ff-tag);font-weight:700;font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;color:var(--glacier-deep);border:1px solid var(--line-2);padding:7px 10px;border-radius:9px;white-space:nowrap;}
.day{margin:0 18px 11px;background:var(--snow);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:15px 16px;display:grid;grid-template-columns:auto 1fr;gap:14px;}
.day.today{border-color:var(--glacier);box-shadow:0 0 0 1px var(--glacier),var(--shadow-sm);}
.day .num{font-family:var(--ff-disp);font-weight:800;font-size:1.6rem;line-height:.8;letter-spacing:-.02em;color:var(--glacier-deep);}
.day .num small{display:block;font-family:var(--ff-tag);font-size:.55rem;letter-spacing:.12em;color:var(--stone-3);margin-top:5px;font-weight:700;}
.day .dow{font-family:var(--ff-tag);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone-3);margin:0 0 1px;}
.day h3{font-family:var(--ff-disp);font-weight:700;font-size:1.1rem;letter-spacing:-.01em;margin:0 0 4px;color:var(--stone);}
.day .where{font-size:.88rem;color:var(--stone-2);margin:0;line-height:1.45;}
.day .din{margin-top:8px;font-size:.82rem;color:var(--glacier-ink);font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.day .din svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.9;flex:0 0 auto;}
.day .din a{color:var(--glacier-deep);text-decoration:underline;text-underline-offset:2px;}
.foot{text-align:center;padding:22px 30px 4px;color:var(--stone-3);font-size:.8rem;line-height:1.5;}
.foot b{color:var(--stone-2);font-weight:700;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:var(--stone);color:var(--snow);font-family:var(--ff-tag);font-weight:700;font-size:.72rem;letter-spacing:.05em;padding:10px 16px;border-radius:11px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s var(--e-out);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important;}}
</style>

    <button class="share" id="share"><svg viewBox="0 0 24 24"><path d="M12 3v13M12 3L8 7M12 3l4 4M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>Share</button>
    <div class="body">
      <p class="ey">Robbie &amp; Ari are in</p>
      <h1>Banff</h1>
      <p class="sub">July 8&ndash;12, 2026 · here's what we're up to</p>
    </div>
  </div>
  <div class="pad"><p class="eyebrow" id="nowEy">Right now</p></div>
  <div id="nowCard"></div>
  <div class="pad"><p class="eyebrow">The week</p></div>
  <div id="days"></div>
  <p class="foot">This is just our rough plan — <b>signal's spotty on the trails</b>, so if you can't reach us we're probably somewhere with a view. Back July 12.</p>
</div>
<div class="toast" id="toast">Link copied</div>
<script>
const TRIP={start:'2026-07-08',end:'2026-07-12'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_LONG={Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
const DAYS=[
 {n:1,date:'2026-07-08',dow:'Wed',head:'Arriving in Banff',where:'Traveling in from Calgary and settling in at the Fairmont by late afternoon.',dinner:{name:'Welcome dinner at the Fairmont',time:'6:30 PM',pid:'ChIJv7gvLjvKcFMRzvb0LKnpmQA'}},
 {n:2,date:'2026-07-09',dow:'Thu',head:'Canyon & town',where:'A spa morning at the hotel, Johnston Canyon around midday, then wandering Banff townsite in the afternoon.',dinner:{name:'Hello Sunshine',time:'6:30 PM',addr:'208 Wolf St',pid:'ChIJzzcqcyLLcFMRx2Wb0M2G36Y'}},
 {n:3,date:'2026-07-10',dow:'Fri',head:'The big hike',where:'Up at Lake Louise & Moraine Lake all day for the Plain of Six Glaciers. Mostly off-grid — don\u2019t expect a reply until the evening.',dinner:{name:'Lupo',time:'7:30 PM',addr:'208 Wolf St',pid:'ChIJaTIim0XKcFMRjwWK5CAvtv0'}},
 {n:4,date:'2026-07-11',dow:'Sat',head:'Easy day + summit dinner',where:'A slow morning around town and the hotel, then up the gondola for the group dinner at the summit.',dinner:{name:'Sky Bistro',time:'evening',addr:'Gondola summit',pid:'ChIJ9S3E0PnJcFMR8dn8aW1SQns'}},
 {n:5,date:'2026-07-12',dow:'Sun',head:'Heading home',where:'Checking out around midday and traveling back to Calgary.',dinner:null},
];
const $=s=>document.querySelector(s);
const parseYMD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ymd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const dl=s=>{const d=parseYMD(s);return MONTHS[d.getMonth()]+' '+d.getDate();};
const forkSVG='<svg viewBox="0 0 24 24"><path d="M6 3v6a2 2 0 0 0 4 0V3M8 11v10M16 3c-1.4 0-2.4 1.9-2.4 4.6 0 2.3 1 3.4 2.4 3.4v10"/></svg>';
const pinSVG='<svg viewBox="0 0 24 24"><path d="M12 21s-6-5.7-6-10a6 6 0 1 1 12 0c0 4.3-6 10-6 10zM12 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>';
function mapUrl(d){const q=encodeURIComponent((d.name||'')+' Banff');return d.pid?`https://www.google.com/maps/search/?api=1&query=${q}&query_place_id=${d.pid}`:`https://www.google.com/maps/search/?api=1&query=${q}`;}
function state(){
  const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const start=parseYMD(TRIP.start),end=parseYMD(TRIP.end);const MS=86400000;
  const days=Math.round((start-today)/MS);const idx=DAYS.findIndex(d=>ymd(today)===d.date);
  const phase=today<start?'before':(today>end?'after':'during');
  return{today,days,idx,phase};
}
function dinnerRow(d,compact){
  if(!d) return '';
  if(compact){
    const link=d.pid?` · <a href="${mapUrl(d)}" target="_blank" rel="noopener">map</a>`:'';
    return `<div class="din">${pinSVG}<span>Dinner: ${d.name}${d.time?', '+d.time:''}${link}</span></div>`;
  }
  return `<div class="dinner"><div class="di">${forkSVG}</div><div><b>${d.name}</b><span>${d.time?d.time:''}${d.addr?' · '+d.addr:''}</span></div>${d.pid?`<a href="${mapUrl(d)}" target="_blank" rel="noopener">Map</a>`:''}</div>`;
}
function renderNow(){
  const st=state();const c=$('#nowCard');const ey=$('#nowEy');
  if(st.phase==='before'){
    ey.textContent = st.days<=1?'Almost there':'Coming up';
    const lbl = st.days<=0?'We arrive today':(st.days===1?'We arrive tomorrow':`We arrive in ${st.days} days`);
    const d=DAYS[0];
    c.innerHTML=`<div class="now"><p class="k">${lbl}</p><h2>See you soon</h2>
      <p>We land in Banff on July 8 and we're here through the 12th. Scroll down for where we'll be each day.</p></div>`;
    return;
  }
  if(st.phase==='after'){
    ey.textContent='That\u2019s a wrap';
    c.innerHTML=`<div class="now"><p class="k">We\u2019re back</p><h2>Home from Banff</h2>
      <p>Thanks for keeping tabs on us. It was unreal — both lakes, the big hike, the whole thing.</p></div>`;
    return;
  }
  const d=DAYS[st.idx];
  ey.innerHTML='<span class="dot"></span> Right now';
  c.innerHTML=`<div class="now"><p class="k"><span class="dot"></span> Today · ${DOW_LONG[d.dow]}</p>
    <h2>${d.head}</h2><p>${d.where}</p>${dinnerRow(d.dinner,false)}</div>`;
}
function renderDays(){
  const st=state();
  $('#days').innerHTML=DAYS.map(d=>{
    const today=st.phase==='during'&&ymd(st.today)===d.date;
    return `<div class="day${today?' today':''}"><div class="num">${d.n}<small>${d.dow.toUpperCase()}</small></div>
      <div><p class="dow">${d.dow} · ${dl(d.date)}${today?' · Today':''}</p><h3>${d.head}</h3>
      <p class="where">${d.where}</p>${dinnerRow(d.dinner,true)}</div></div>`;
  }).join('');
}
$('#share').addEventListener('click',async()=>{
  const data={title:'Find Robbie & Ari · Banff',text:'Where we are in Banff this week',url:location.href};
  try{ if(navigator.share){ await navigator.share(data); return; } }catch(e){ return; }
  try{ await navigator.clipboard.writeText(location.href); const t=$('#toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }catch(e){}
});
renderNow(); renderDays();
setInterval(()=>{ renderNow(); renderDays(); },60000);
</script>
